<style>
  :root{
    --ground:#EFE8DE; --surface:#FBF7F1; --ink:#2A2320; --ink-soft:#8A7C6E;
    --line:#DED3C4; --accent:#A24A28; --on-accent:#FBF7F1;
    --font-display:Georgia,"Iowan Old Style","Times New Roman",serif;
    --font-body:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,"Segoe UI",sans-serif;
  }
  @media (prefers-color-scheme:dark){
    :root{ --ground:#241C17; --surface:#2C231D; --ink:#EFE7DC; --ink-soft:#A8998A; --line:#4A3C31; --accent:#E08A5A; --on-accent:#241C17; }
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--ground); color:var(--ink); font-family:var(--font-body); font-size:17px; line-height:1.6;
       min-height:100vh; display:flex; align-items:center; justify-content:center; padding:28px 18px}
  .card{background:var(--surface); border:1px solid var(--line); border-radius:18px; max-width:420px; width:100%;
        padding:30px 26px 32px; text-align:center; box-shadow:0 10px 40px rgba(40,30,20,.10)}
  .eyebrow{font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-soft); font-weight:700; margin:0 0 8px}
  h1{font-family:var(--font-display); font-weight:700; font-size:26px; line-height:1.22; margin:0 0 6px}
  .sub{color:var(--ink-soft); font-size:15px; margin:0 0 18px}
  .vidwrap{position:relative; width:100%; max-width:300px; margin:0 auto 8px; border-radius:14px; overflow:hidden;
           border:1px solid var(--line); background:#000}
  video{display:block; width:100%; height:auto; border-radius:14px}
  .hint{font-size:12.5px; color:var(--ink-soft); margin:6px 0 20px}
  .cta{display:inline-block; background:var(--accent); color:var(--on-accent); text-decoration:none;
       font-weight:700; font-size:16px; padding:15px 30px; border-radius:10px}
  .close{font-size:13px; color:var(--ink-soft); margin:16px 0 0}
  .close b{color:var(--ink)}
</style>

<body>
  <main class="card">
    <p class="eyebrow">The Second Brain Method</p>
    <h1>How we run the business on Claude</h1>
    <p class="sub">Clients, pipeline, revenue, decisions — all in one place the AI can actually reason over. Here's the 2-minute version.</p>
    <div class="vidwrap">
      <video id="sbvideo" controls muted autoplay playsinline preload="metadata"
             poster="../assets/second_brain_poster.jpg">
        <source src="../assets/second_brain.mp4" type="video/mp4">
        <img src="../assets/second_brain_poster.jpg" alt="How we run the business on Claude" style="width:100%">
      </video>
    </div>
    <p class="hint">🔊 Tap the video to unmute</p>
    <a class="cta" href="https://puja-patel.com" id="cta">See the Second Brain Method →</a>
    <p class="close">Founding group + live workshop close <b>Thursday, July 24</b>.</p>
  </main>

<script>
  /* Email-click identification: links in customer.io emails carry ?e={{customer.email}}.
     Without this every video event below lands on an anonymous profile and you cannot
     tell who watched. Same pattern as index.html. */
  try{
    var qp = new URLSearchParams(location.search);
    var em = qp.get('e') || qp.get('cio_email');
    if(em && /@/.test(em)){
      em = em.trim().toLowerCase();
      localStorage.setItem('sbm_email', em);
    }
    var known = localStorage.getItem('sbm_email');
    if(known && window._cio){ _cio.identify({id: known, email: known}); }
  }catch(e){}

  // Lightweight engagement tracking (Clarity + Customer.io) — feeds the "engaged with the site" signal.
  (function(){
    var v=document.getElementById('sbvideo'), fired={};
    function mark(name){ if(fired[name])return; fired[name]=1;
      try{ if(window.clarity) clarity('set', name, 'true'); }catch(e){}
      try{ if(window._cio) _cio.track(name); }catch(e){}
    }
    if(v){
      v.addEventListener('play', function(){ mark('watch_video_play'); });
      v.addEventListener('timeupdate', function(){
        if(v.duration && v.currentTime/v.duration >= 0.5) mark('watch_video_half');
      });
      v.addEventListener('ended', function(){ mark('watch_video_complete'); });
    }
    document.getElementById('cta').addEventListener('click', function(){ mark('watch_cta_click'); });
  })();
</script>
</body>
